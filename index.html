    .toast { position: fixed; bottom: 30px; left: 20px; background: #b91c1c; color: white; padding: 12px 26px; border-radius: 40px; font-weight: bold; z-index: 9999; font-size: 14px; box-shadow: 0 0 18px #ff0000; animation: fadeIn 0.2s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 720px) { .social-icons a { font-size: 20px; } .logo h1 { font-size: 1.4rem; } .action-buttons { flex-direction: column; } }

  <footer><p>𝕻𝕾𝕻 𝕲𝕬𝕸𝕰𝕽𝕾™ — Half-star ratings (click stars to rate 0.5-5) | Auto GitHub backup.json | Share any game</p></footer>

<script>
  const ADMIN_PASSWORD = "pspgamers5";
  const STORAGE_GAMES = "psp_gamers_halfstar";
  const BACKUP_FILENAME = "backup.json";
  
  let isAdminLoggedIn = false;
  let gamesData = [];
  let currentGenreFilter = "all";
  let currentTagFilter = "all";
  let uploadedImageData = null;

  function loadGames() {
    const stored = localStorage.getItem(STORAGE_GAMES);
    if (stored) {
      try {
        let games = JSON.parse(stored);
        games = games.map(g => { 
          if(g.ratings?.length) g.averageRating = g.ratings.reduce((a,b)=>a+b,0)/g.ratings.length; 
          else { g.ratings = []; g.averageRating = 0; } 
          if(!g.tags) g.tags = []; 
          if(!g.genre) g.genre = "Action"; 
          return g;
        });
        saveGames(games);
        return games;
      } catch(e) { return []; }
    }
    return [];
  }

  function saveGames(games) { 
    localStorage.setItem(STORAGE_GAMES, JSON.stringify(games));
    updateBackupCount();
  }

  function updateBackupCount() {
    const span = document.getElementById('backupCountDisplay');
    if (span) span.innerHTML = `${gamesData.length} games`;
  }

  function renderStarDisplay(rating) {
    const fullStars = Math.floor(rating);
    const hasHalf = rating - fullStars >= 0.25 && rating - fullStars < 0.75;
    const roundedHalf = rating - fullStars >= 0.5;
    let starsHtml = '';
    for (let i = 1; i <= 5; i++) {
      if (i <= fullStars) {
        starsHtml += '<i class="star fas fa-star full"></i>';
      } else if (i === fullStars + 1 && (hasHalf || roundedHalf)) {
        starsHtml += '<i class="star fas fa-star-half-alt half" style="color:#ffd700;"></i>';
      } else {
        starsHtml += '<i class="star far fa-star empty" style="color:#4a4a4a;"></i>';
      }
    }
    return starsHtml;
  }

  function renderInteractiveStars(gameId, currentRating) {
    let starsHtml = '';
    for (let i = 1; i <= 5; i++) {
      starsHtml += `<i class="star fas fa-star" data-star-value="${i}" data-game="${gameId}" style="font-size:22px; cursor:pointer; color:#ffd700; margin-right:3px;"></i>`;
    }
    return starsHtml;
  }

  function showToast(msg, isErr = false) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-triangle' : 'fa-crown'}"></i> ${msg}`;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2800);
  }

  // GitHub Backup Functions
  function saveToGitHubBackup() {
    const backupData = {
      timestamp: new Date().toISOString(),
      version: "1.0",
      totalGames: gamesData.length,
      games: gamesData
    };
    const dataStr = JSON.stringify(backupData, null, 2);
    const blob = new Blob([dataStr], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.download = BACKUP_FILENAME;
    a.href = url;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast(`💾 backup.json saved! Upload this file to your GitHub repo root.`);
  }

  function loadFromGitHubBackup() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/json';
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          let importedGames = data.games || (Array.isArray(data) ? data : null);
          if (!importedGames) throw new Error();
          importedGames = importedGames.map(g => {
            if (!g.ratings) g.ratings = [];
            const total = g.ratings.reduce((s, r) => s + r, 0);
            g.averageRating = g.ratings.length ? total / g.ratings.length : 0;
            if (!g.tags) g.tags = [];
            if (!g.genre) g.genre = "Action";
            return g;
          });
          gamesData = importedGames;
          saveGames(gamesData);
          renderFilterButtons();
          renderGames();
          showToast(`✅ Loaded ${gamesData.length} games from backup.json`);
        } catch(err) {
          showToast("Invalid backup file", true);
        }
      };
      reader.readAsText(file);
    };
    input.click();
  }

  // Admin Functions
  function showAdminLoginModal() {
    const modal = document.createElement('div');
    modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:10000;display:flex;align-items:center;justify-content:center;';
    modal.innerHTML = `<div style="background:#0f0505;border:2px solid #dc2626;border-radius:48px;padding:40px;max-width:400px;text-align:center;"><i class="fas fa-skull" style="font-size:48px;color:#dc2626;"></i><h2 style="color:#ff5555;">Admin Access</h2><input type="password" id="adminPassword" placeholder="Password" style="width:100%;background:#1f0a0a;border:1px solid #b91c1c;border-radius:60px;padding:14px;margin:20px 0;"><button id="loginSubmitBtn" style="background:#dc2626;border:none;padding:12px;border-radius:60px;color:white;width:100%;cursor:pointer;">Verify</button><div id="loginError" style="color:#ff8888;margin-top:12px;display:none;">Wrong password</div></div>`;
    document.body.appendChild(modal);
    document.getElementById('loginSubmitBtn').onclick = () => { 
      if(document.getElementById('adminPassword').value === ADMIN_PASSWORD) { 
        isAdminLoggedIn = true; 
        modal.remove(); 
        enableAdminMode(); 
        showToast("Admin access granted"); 
      } else { 
        document.getElementById('loginError').style.display = 'block'; 
      } 
    };
  }
  
  function enableAdminMode() { 
    document.getElementById('adminPanel').classList.add('show'); 
    document.getElementById('adminToggleBtn').classList.add('active'); 
    document.getElementById('adminToggleBtn').innerHTML = '<i class="fas fa-user-check"></i> Admin ON'; 
    updateAdminDeleteButtons(); 
  }
  
  function logoutAdmin() { 
    isAdminLoggedIn = false; 
    document.getElementById('adminPanel').classList.remove('show'); 
    document.getElementById('adminToggleBtn').classList.remove('active'); 
    document.getElementById('adminToggleBtn').innerHTML = '<i class="fas fa-user-shield"></i> Admin Login'; 
    updateAdminDeleteButtons(); 
  }
  
  function toggleAdmin() { isAdminLoggedIn ? logoutAdmin() : showAdminLoginModal(); }

  // Screenshot upload
  document.getElementById('uploadScreenshotBtn')?.addEventListener('click', () => document.getElementById('screenshotFileInput').click());
  document.getElementById('screenshotFileInput')?.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if(file && file.type.startsWith('image/')) {
      const reader = new FileReader();
      reader.onload = function(ev) {
        uploadedImageData = ev.target.result;
        const preview = document.getElementById('screenshotPreview');
        preview.innerHTML = `<img src="${uploadedImageData}" style="width:100%;height:100%;object-fit:cover;">`;
        document.getElementById('gameScreenshot').value = uploadedImageData;
      };
      reader.readAsDataURL(file);
    }
  });

  function uploadGame() {
    if (!isAdminLoggedIn) { showToast("Login required", true); return; }
    const title = document.getElementById('gameTitle').value.trim();
    const link = document.getElementById('gameLink').value.trim();
    const genre = document.getElementById('gameGenre').value;
    const tags = document.getElementById('gameTags').value.trim().split(',').map(t=>t.trim().toLowerCase()).filter(t=>t);
    let screenshot = document.getElementById('gameScreenshot').value.trim();
    if(!screenshot && uploadedImageData) screenshot = uploadedImageData;
    const desc = document.getElementById('gameDesc').value.trim();
    if (!title || !link || !desc) { showToast("Fill all required fields", true); return; }
    if (!link.match(/^https?:\/\//i)) { showToast("Invalid URL", true); return; }
    const newGame = { id: "psp_" + Date.now() + "_" + Math.random().toString(36).substr(2,6), title, link, genre, tags, screenshot, description: desc, ratings: [], averageRating: 0, createdAt: Date.now() };
    gamesData.unshift(newGame);
    saveGames(gamesData);
    renderFilterButtons(); renderGames();
    document.getElementById('gameTitle').value = ""; document.getElementById('gameLink').value = ""; document.getElementById('gameTags').value = ""; document.getElementById('gameScreenshot').value = ""; document.getElementById('gameDesc').value = ""; uploadedImageData = null; document.getElementById('screenshotPreview').innerHTML = '<i class="fas fa-image"></i>';
    showToast(`✅ "${title}" added!`);
  }

  function shareGame(game) {
    const shareUrl = window.location.href;
    const shareText = `🎮 Check out "${game.title}" on PSP GAMERS!\n\n${game.description.substring(0, 100)}...\n\nPlay here: ${game.link}`;
    
    if (navigator.share) {
      navigator.share({
        title: game.title,
        text: `Check out ${game.title} on PSP GAMERS!`,
        url: game.link
      }).catch(() => {});
    } else {
      const modal = document.createElement('div');
      modal.className = 'share-modal';
      modal.innerHTML = `
        <h3 style="color:#ff5555;"><i class="fas fa-share-alt"></i> Share ${escapeHtml(game.title)}</h3>
        <input type="text" id="shareLinkInput" value="${game.link}" readonly>
        <button id="copyShareLink" style="background:#dc2626;border:none;padding:10px 20px;border-radius:40px;color:white;cursor:pointer;width:100%;"><i class="fas fa-copy"></i> Copy Link</button>
        <button id="closeShareModal" style="background:transparent;border:1px solid #dc2626;padding:10px;border-radius:40px;color:#ffaaaa;cursor:pointer;width:100%;margin-top:10px;">Close</button>
      `;
      document.body.appendChild(modal);
      document.getElementById('copyShareLink').onclick = () => {
        const input = document.getElementById('shareLinkInput');
        input.select();
        document.execCommand('copy');
        showToast("Game link copied!");
      };
      document.getElementById('closeShareModal').onclick = () => modal.remove();
      modal.addEventListener('click', (e) => { if(e.target === modal) modal.remove(); });
    }
  }

  function openFullscreen(game) {
    const modal = document.createElement('div');
    modal.className = 'fullscreen-modal';
    modal.innerHTML = `<div class="close-fullscreen" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></div><div class="fullscreen-content">${game.screenshot && game.screenshot.startsWith('data:') ? `<img src="${game.screenshot}">` : (game.screenshot ? `<img src="${game.screenshot}" onerror="this.src='https://via.placeholder.com/800x400?text=No+Screenshot'">` : '<i class="fas fa-gamepad" style="font-size:100px;"></i>')}<h2 class="fullscreen-title">${escapeHtml(game.title)}</h2><p style="color:#ccc;margin-top:15px;">${escapeHtml(game.description)}</p><div style="display:flex;gap:15px;justify-content:center;margin-top:20px;"><a href="${escapeHtml(game.link)}" target="_blank" style="background:#dc2626;padding:10px 30px;border-radius:40px;color:white;text-decoration:none;"><i class="fas fa-download"></i> Play Now</a><button onclick="window.shareGameFunc('${game.id}')" style="background:#2a0a0a;border:1px solid #dc2626;padding:10px 30px;border-radius:40px;color:#ffaaaa;cursor:pointer;"><i class="fas fa-share-alt"></i> Share</button></div></div>`;
    document.body.appendChild(modal);
    modal.addEventListener('click', (e) => { if(e.target === modal) modal.remove(); });
    window.shareGameFunc = (id) => { const g = gamesData.find(g => g.id === id); if(g) { shareGame(g); modal.remove(); } };
  }

  function rateGame(gameId, starValue) {
    const idx = gamesData.findIndex(g => g.id === gameId);
    if(idx !== -1) {
      gamesData[idx].ratings.push(starValue);
      gamesData[idx].averageRating = gamesData[idx].ratings.reduce((a,b)=>a+b,0)/gamesData[idx].ratings.length;
      saveGames(gamesData);
      renderFilterButtons();
      renderGames();
      showToast(`⭐ Rated ${gamesData[idx].title} ${starValue} stars!`);
    }
  }

  function renderFilterButtons() {
    const genres = ["all", ...new Set(gamesData.map(g=>g.genre).filter(g=>g))];
    document.getElementById('genreFilterButtons').innerHTML = genres.map(g => `<button class="genre-btn ${currentGenreFilter===g?'active':''}" data-genre="${g}">${g==='all'?'🎮 All':g}</button>`).join('');
    const tagsSet = new Set(); gamesData.forEach(g=>{if(g.tags) g.tags.forEach(t=>tagsSet.add(t.toLowerCase()));});
    const tags = ["all", ...Array.from(tagsSet).sort()];
    document.getElementById('tagFilterButtons').innerHTML = tags.map(t => `<button class="tag-filter-btn ${currentTagFilter===t?'active':''}" data-tag="${t}">${t==='all'?'🏷️ All':`#${t}`}</button>`).join('');
    document.querySelectorAll('.genre-btn').forEach(btn=>btn.addEventListener('click',()=>{currentGenreFilter=btn.dataset.genre;currentTagFilter="all";renderFilterButtons();renderGames();}));
    document.querySelectorAll('.tag-filter-btn').forEach(btn=>btn.addEventListener('click',()=>{currentTagFilter=btn.dataset.tag;currentGenreFilter="all";renderFilterButtons();renderGames();}));
  }

  function filterGames() {
    let filtered = [...gamesData];
    if(currentGenreFilter!=="all") filtered = filtered.filter(g=>g.genre===currentGenreFilter);
    if(currentTagFilter!=="all") filtered = filtered.filter(g=>g.tags&&g.tags.some(t=>t.toLowerCase()===currentTagFilter));
    return filtered;
  }

  function renderGames() {
    const container = document.getElementById('gamesContainer');
    const countSpan = document.getElementById('gameCountBadge');
    const filtered = filterGames();
    if (!gamesData.length) { container.innerHTML = `<div class="empty-state"><i class="fas fa-skull-crossbones"></i><p>No games. Admin login to add!</p><p>Password: ${ADMIN_PASSWORD}</p></div>`; countSpan.innerText = "0"; return; }
    countSpan.innerText = gamesData.length;
    if (!filtered.length) { container.innerHTML = `<div class="empty-state"><i class="fas fa-filter"></i><p>No matches. Clear filters.</p></div>`; return; }
    container.innerHTML = "";
    filtered.forEach(game => {
      const avg = game.averageRating ? game.averageRating.toFixed(1) : "0.0";
      const card = document.createElement('div');
      card.className = 'game-card';
      card.onclick = () => openFullscreen(game);
      card.innerHTML = `
        <div class="game-screenshot">${game.screenshot ? `<img src="${escapeHtml(game.screenshot)}" style="width:100%;height:100%;object-fit:cover;" onerror="this.onerror=null;this.parentElement.innerHTML='<i class=\\'fas fa-dragon\\'></i>';">` : '<i class="fas fa-dragon"></i>'}</div>
        <div class="game-info">
          <div class="game-title-row"><span class="game-title">${escapeHtml(game.title)}</span><span class="genre-tag">${escapeHtml(game.genre)}</span></div>
          <div class="tags-container">${game.tags?.map(t=>`<span class="game-tag">#${escapeHtml(t)}</span>`).join('')||'<span>no tags</span>'}</div>
          <div class="game-desc">${escapeHtml(game.description).substring(0,100)}...</div>
          <div class="rating-section">
            <div class="stars-container" data-gameid="${game.id}" onclick="event.stopPropagation()">
              ${[1, 1.5, 2, 2.5, 3, 3.5, 4, 4.5, 5].map(v => `<i class="star fas fa-star" data-star-value="${v}" data-game="${game.id}" style="font-size:20px; cursor:pointer; color:#ffd700; margin-right:2px;"></i>`).join('')}
            </div>
            <div class="avg-rating"><i class="fas fa-chart-simple"></i> ${avg} (${game.ratings?.length||0} votes)</div>
          </div>
          <div class="action-buttons" onclick="event.stopPropagation()">
            <button class="download-link" data-url="${escapeHtml(game.link)}"><i class="fas fa-download"></i> Play</button>
            <button class="share-link" data-game-id="${game.id}"><i class="fas fa-share-alt"></i> Share</button>
          </div>
          <div class="admin-actions" id="adminActions-${game.id}" style="display: none;" onclick="event.stopPropagation()"><button class="delete-game" data-id="${game.id}"><i class="fas fa-trash-alt"></i> Delete</button></div>
        </div>`;
      container.appendChild(card);
    });
    
    // Attach events
    document.querySelectorAll('.star').forEach(star => {
      star.addEventListener('click', (e) => {
        e.stopPropagation();
        const val = parseFloat(star.dataset.starValue);
        const id = star.dataset.game;
        rateGame(id, val);
      });
    });
    document.querySelectorAll('.download-link').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        window.open(btn.dataset.url, '_blank');
      });
    });
    document.querySelectorAll('.share-link').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = btn.dataset.gameId;
        const game = gamesData.find(g => g.id === id);
        if(game) shareGame(game);
      });
    });
    document.querySelectorAll('.delete-game').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        if(!isAdminLoggedIn) { showToast("Login required", true); return; }
        const id = btn.dataset.id;
        if(confirm("Delete game?")) {
          const title = gamesData.find(g=>g.id===id)?.title;
          gamesData = gamesData.filter(g=>g.id!==id);
          saveGames(gamesData);
          renderFilterButtons();
          renderGames();
          showToast(`🗑️ "${title}" deleted`);
        }
      });
    });
    updateAdminDeleteButtons();
  }

  function updateAdminDeleteButtons() { 
    document.querySelectorAll('[id^="adminActions-"]').forEach(div => { 
      div.style.display = isAdminLoggedIn ? 'flex' : 'none'; 
    }); 
  }
  
  function clearAllFilters() { currentGenreFilter = "all"; currentTagFilter = "all"; renderFilterButtons(); renderGames(); showToast("Filters cleared"); }
  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

  document.addEventListener('DOMContentLoaded', () => {
    gamesData = loadGames();
    renderFilterButtons();
    renderGames();
    document.getElementById('uploadGameBtn')?.addEventListener('click', uploadGame);
    document.getElementById('adminToggleBtn')?.addEventListener('click', toggleAdmin);
    document.getElementById('githubBackupBtn')?.addEventListener('click', saveToGitHubBackup);
    document.getElementById('loadFromGitHubBtn')?.addEventListener('click', loadFromGitHubBackup);
    document.getElementById('clearFiltersBtn')?.addEventListener('click', clearAllFilters);
    updateBackupCount();
  });
</script>
</body>
</html>
